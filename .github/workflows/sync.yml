name: Sync KPIs People

on:
  schedule:
    # 22:00 BRT = 01:00 UTC
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Executar sync
        env:
          NEKT_API_KEY: ${{ secrets.NEKT_API_KEY }}
        run: python sync.py

      - name: Commit e push do data.js
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data.js public/history.json
          git diff --cached --quiet || git commit -m "sync: atualiza data.js $(date +'%d/%m/%Y %H:%M')"
          git push
